_target_: lightning.pytorch.Trainer
max_epochs: 10
devices: auto
accelerator: auto
log_every_n_steps: 10
precision: "bf16-mixed"
gradient_clip_val: 1.0
accumulate_grad_batches: 1
# deterministic: True

# Callbacks: without a ModelCheckpoint the test phase is skipped (train.py
# derives the test checkpoint from trainer.checkpoint_callbacks), so no
# protocol metrics are ever produced. Monitor the epoch-level val/loss.
callbacks:
  - _target_: lightning.pytorch.callbacks.ModelCheckpoint
    monitor: val/loss
    mode: min
    save_top_k: 1
    save_last: true
    auto_insert_metric_name: false
    filename: "epoch{epoch:02d}"
  - _target_: lightning.pytorch.callbacks.EarlyStopping
    monitor: val/loss
    mode: min
    patience: 7
  - _target_: lightning.pytorch.callbacks.LearningRateMonitor
    logging_interval: step
