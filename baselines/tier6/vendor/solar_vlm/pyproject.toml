[project]
name = "solar-vlm"
version = "0.1.0"
requires-python = ">=3.11,<3.14"
dependencies = [
    "datasets>=4.8.5",
    "matplotlib>=3.10.7",
    "numpy>=1.24,<2.0",
    "openpyxl>=3.1.5",
    "pandas>=3.0.3",
    "pillow>=12.0.0",
    "qwen-vl-utils>=0.0.8",
    "torch",
    "torchvision",
    "transformers>=5.9.0",
]

[[tool.uv.index]]
name = "pytorch-cu126"
url = "https://download.pytorch.org/whl/cu126"
explicit = true

[tool.uv.sources]
torch = [{ index = "pytorch-cu126" }]
torchvision = [{ index = "pytorch-cu126" }]